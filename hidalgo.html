<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIDALGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Inter:wght@300;400;900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght,ROND@900,100&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "DotGothic16", sans-serif !important;
        text-transform: uppercase;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .dot-matrix {
        font-family: "Doto", sans-serif !important;
        text-transform: uppercase;
        font-variation-settings: "ROND" 0;
      }

      :root {
        --nothing-red: #ff0000;
        --nothing-black: #000000;
        --nothing-white: #ffffff;
      }
      body {
        background-color: var(--nothing-black);
        color: var(--nothing-white);
        background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
        background-size: 30px 30px;
      }
      .nothing-widget {
        background: rgba(18, 18, 18, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 36px;
        backdrop-filter: blur(12px);
        transition: 0.3s;
      }
      .glyph-led {
        width: 10px;
        height: 10px;
        background-color: var(--nothing-red);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--nothing-red);
      }
      .img-aesthetic {
        filter: grayscale(100%);
        transition: 0.5s;
        border-radius: 24px;
      }
      .img-aesthetic:hover {
        filter: grayscale(0%);
      }
    </style>
  </head>
  <body class="p-4 md:p-8 min-h-screen flex flex-col">
    <header class="flex justify-between items-start w-full mb-12">
      <a
        href="index.html"
        class="nothing-widget px-6 py-3 flex items-center gap-4 hover:text-red-500"
      >
        <span><-</span> <span>VOLVER</span>
      </a>
      <div class="nothing-widget px-6 py-3 flex items-center gap-4">
        <div class="glyph-led"></div>
        <span class="text-sm">HIDALGO.CORE</span>
      </div>
    </header>

    <main
      class="flex-grow max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-4 gap-4 mb-24"
    >
      <div
        class="md:col-span-2 nothing-widget p-10 flex flex-col justify-between"
      >
        <span class="text-[8px] text-zinc-500">DATOS_MINEROS</span>
        <div>
          <h2 class="text-6xl font-black mb-6">HIDALGO</h2>
          <p class="text-xs text-zinc-400">
            Viento y montaña. Una interfaz donde el trabajo minero y la
            tradición británica convergen en un solo pulso.
          </p>
        </div>
      </div>

      <div
        class="md:col-span-2 nothing-widget p-4 overflow-hidden aspect-video md:aspect-auto"
      >
        <img
          src="https://i.pinimg.com/originals/d6/e6/a3/d6e6a33084dc671cb699a5fd34aa14b8.jpg"
          class="w-full h-full object-cover img-aesthetic"
        />
      </div>

      <div
        class="md:col-span-3 nothing-widget p-8 grid grid-cols-2 md:grid-cols-4 gap-4"
      >
        <div class="text-center border-r border-zinc-800">
          <p class="text-[8px] text-zinc-500">PASTE</p>
          <p class="text-xs">TRADICIÓN</p>
        </div>
        <div class="text-center border-r border-zinc-800">
          <p class="text-[8px] text-zinc-500">MINAS</p>
          <p class="text-xs">HISTORIA</p>
        </div>
        <div class="text-center border-r border-zinc-800">
          <p class="text-[8px] text-zinc-500">FÚTBOL</p>
          <p class="text-xs">ORIGEN</p>
        </div>
        <div class="text-center">
          <p class="text-[8px] text-zinc-500">PRISMAS</p>
          <p class="text-xs">GEOMETRÍA</p>
        </div>
      </div>

      <div class="nothing-widget p-8 flex items-center justify-center">
        <a
          href="https://hidalgo.travel"
          target="_blank"
          class="text-red-500 text-[10px] underline"
          >HIDALGO.TRAVEL</a
        >
      </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full flex justify-center pb-4">
      <nav
        class="nothing-widget px-8 py-4 flex gap-8 items-center overflow-x-auto no-scrollbar"
      >
        <a href="index.html" class="text-[10px] text-zinc-600">INICIO</a>
        <a href="tlaxcala.html" class="text-[10px] text-zinc-600">TLAXCALA</a>
        <div class="flex flex-col items-center">
          <a href="hidalgo.html" class="text-[10px] text-white">HIDALGO</a>
          <div class="w-1 h-1 bg-red-500 rounded-full mt-1"></div>
        </div>
        <a href="queretaro.html" class="text-[10px] text-zinc-600">QUERÉTARO</a>
        <a href="michoacan.html" class="text-[10px] text-zinc-600">MICHOACÁN</a>
        <a href="veracruz.html" class="text-[10px] text-zinc-600">VERACRUZ</a>
      </nav>
    </footer>
  </body>
</html>
